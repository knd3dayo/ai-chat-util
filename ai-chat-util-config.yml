# ai_chat_util config example

ai_chat_util_config:
  #
  # NOTE:
  # - This file contains NON-secret settings only.
  # - Secrets (API keys / tokens) should be provided via environment variables or .env.
  # - At runtime, config.yml is required. Resolution order:
  #   1) --config
  #   2) AI_CHAT_UTIL_CONFIG
  #   3) ./config.yml (cwd)
  #   4) <project-root>/config.yml

  llm:
    # Provider name used by LiteLLM. Examples: openai, azure, anthropic
    provider: openai

    # Default timeout (seconds) for LLM requests.
    timeout_seconds: 60

    # API key reference (secret).
    # - Secrets themselves must NOT be written in config.yml.
    # - Use env reference format:
    #     api_key: os.environ/LLM_API_KEY
    # - openai / azure / anthropic の provider を使う場合は必須です。
    api_key: os.environ/LLM_API_KEY

    # Model name (or Azure deployment name) for chat completion
    completion_model: gpt-5

    # Model name for embeddings
    embedding_model: text-embedding-3-small

    # Non-secret API base URL (optional).
    # - OpenAI: https://api.openai.com/v1/
    # - Azure OpenAI: https://<resource-name>.openai.azure.com/
    base_url: null

    # Non-secret API version (mainly for Azure OpenAI; optional)
    api_version: null

    # Optional: extra HTTP headers for LLM requests (may contain secrets).
    # Values MUST be env references (do NOT write secrets directly in YAML).
    #
    # Reserved prefixes for MCP forwarding:
    # - x-mcp-<Header-Name>: forwarded to MCP HTTP/SSE/WebSocket transports as request headers.
    # - x-mcp-env-<ENV_NAME>: forwarded to MCP stdio transport as environment variables.
    #   (ENV_NAME must match [A-Za-z_][A-Za-z0-9_]*.)
    # NOTE: Reserved x-mcp-* keys are NOT sent to LiteLLM.
    # Example:
    #   extra_headers:
    #     Authorization: os.environ/OPENAI_AUTH_HEADER
    #     X-My-Org: os.environ/MY_ORG_ID
    #     x-mcp-Authorization: os.environ/MCP_AUTH_HEADER
    #     x-mcp-env-HTTP_PROXY: os.environ/HTTP_PROXY
    extra_headers: null

  paths:
    # Optional: MCP client settings JSON path
    # - Preferred key: mcp_config_path
    # - Backward compatible key: mcp_server_config_file_path
    mcp_config_path: null
    mcp_server_config_file_path: null

    # Optional: custom instructions path
    custom_instructions_file_path: null

    # Base directory used to resolve relative paths
    working_directory: work

  features:
    allow_outside_modifications: false
    use_custom_pdf_analyzer: false

    # HITL（Human in the loop）: 承認が必要なツール名リスト
    # 例: ["analyze_files", "analyze_pdf_files"]
    hitl_approval_tools: []

  logging:
    level: INFO
    file: null

  network:
    # SSL verification for downloading files from URLs (recommended: true)
    requests_verify: true

    # Optional CA bundle path (PEM). Useful behind corporate proxy / SSL inspection.
    ca_bundle: null

  office2pdf:
    # Optional LibreOffice binary path.
    # - Windows example: C:\\Program Files\\LibreOffice\\program\\soffice.exe
    # - Or just "soffice" if it's on PATH
    libreoffice_path: null

  # --- autonomous-agent-util settings (integrated) ---
  # autonomous-agent-util-config.yml の内容を、このファイルの
  # `ai_chat_util_config.autonomous_agent_util:` 配下に統合します。
  autonomous_agent_util:
    llm:
      # NOTE:
      # - provider/base_url/api_key/base_model は未指定なら ai_chat_util_config.llm から継承されます。
      # - `model` は継承されないため、autonomous 側で使うモデルを指定してください。
      model: gpt-4o
      # base_url_in_container: http://host.docker.internal:11434/v1

    backend:
      # docker | compose | subprocess | process
      task_backend: process

    monitor:
      disable_detach_monitor: false
      detach_monitor_interval: 2.0
      debug_container: false

    paths:
      workspace_root: /tmp/autonomous_agent_tasks
      host_projects_root: /tmp/autonomous_agent_projects
      # executor_allowed_workspace_root: /tmp
      # workspace_path_rewrites:
      #   - from: /srv/ai_platform/workspaces
      #     to: /workspaces

    host:
      uid: null
      gid: null

    subprocess:
      command: opencode run

    compose:
      directory: .
      file: docker-compose.yml
      service_name: executor-service
      command: opencode run

    logging:
      level: INFO
      # file: /tmp/autonomous-agent-util.log
