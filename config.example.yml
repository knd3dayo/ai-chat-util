# ai_chat_util config example (NON-secrets only)
#
# NOTE:
# - Secrets (API keys / tokens) must NOT be written here.
# - Provide secrets via environment variables or .env.
# - In this YAML, secrets are referenced as: os.environ/ENV_VAR_NAME

ai_chat_util_config:
  llm:
    # Provider name used by LiteLLM. Examples: openai, azure, anthropic
    provider: openai

    # Default timeout (seconds) for LLM requests.
    timeout_seconds: 60

    # Secret API key reference (required for openai/azure/anthropic).
    # Example:
    #   api_key: os.environ/LLM_API_KEY
    api_key: null

    # Model name (or Azure deployment name) for chat completion
    completion_model: gpt-5

    # Model name for embeddings
    embedding_model: text-embedding-3-small

    # Non-secret API base URL (optional).
    base_url: null

    # Non-secret API version (mainly for Azure OpenAI; optional)
    api_version: null

    # Optional: extra HTTP headers for LLM requests (may contain secrets).
    # Values MUST be env references (do NOT write secrets directly in YAML).
    # Example:
    #   extra_headers:
    #     Authorization: os.environ/OPENAI_AUTH_HEADER
    #     X-My-Org: os.environ/MY_ORG_ID
    extra_headers: null

  mcp:
    # Optional: MCP client settings JSON path
    mcp_config_path: null

    # Optional: custom instructions path
    custom_instructions_file_path: null

    # Base directory used to resolve relative paths
    working_directory: work

    # Optional: extra headers/env forwarding for MCP transports (may contain secrets).
    # Values MUST be env references (do NOT write secrets directly in YAML).
    #
    # - x-mcp-<Header-Name>: forwarded to MCP HTTP/SSE/WebSocket transports as request headers.
    # - x-mcp-env-<ENV_NAME>: forwarded to MCP stdio transport as environment variables.
    #   (ENV_NAME must match [A-Za-z_][A-Za-z0-9_]*.)
    # NOTE: These settings are NOT sent to LiteLLM.
    # Example:
    #   extra_headers:
    #     x-mcp-Authorization: os.environ/MCP_AUTH_HEADER
    #     x-mcp-env-HTTP_PROXY: os.environ/HTTP_PROXY
    extra_headers: null

  features:
    allow_outside_modifications: false
    use_custom_pdf_analyzer: false
    hitl_approval_tools: []

  logging:
    level: INFO
    file: null

  network:
    requests_verify: true
    ca_bundle: null

  office2pdf:
    libreoffice_path: null

