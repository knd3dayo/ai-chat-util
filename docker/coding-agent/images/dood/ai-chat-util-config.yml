ai_chat_util_config:
  llm:
    provider: openai
    completion_model: gpt-4o
    timeout_seconds: 300
    api_key: os.environ/LLM_API_KEY
    base_url: "http://localhost:4000"

  features:
    use_custom_pdf_analyzer: true
    mcp_tool_call_limit: 100

  mcp:
    mcp_config_path: "/opt/ai-chat-util/dood/mcp.json"

coding_agent_util:
  backend:
    task_backend: docker

  monitor:
    disable_detach_monitor: false
    detach_monitor_interval: 2.0
    debug_container: false

  paths:
    workspace_root: /srv/ai_platform/workspaces
    host_projects_root: /srv/ai_platform/workspaces/projects
    executor_allowed_workspace_root: /srv/ai_platform/workspaces

  host:
    uid: 1000
    gid: 1000

  process:
    command: opencode run

  compose:
    directory: /opt/ai-chat-util/dood
    file: backend-compose.yml
    service_name: all-in-one-code-executor
    command: "opencode run"

  logging:
    level: INFO